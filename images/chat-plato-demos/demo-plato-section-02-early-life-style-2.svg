  .body strong{font-weight:700;color:#6b5b4f.body em{font-style:italic}.body p{margin:0}.body ul{margin:0;padding:0;list-style:none}.body li{margin:0 0 18px;padding:0 0 18px 20px;border-bottom:1px solid #eeecea;position:relative}.body li:last-child{border-bottom:0;margin-bottom:0}.body li:before{content:'';position:absolute;left:0;top:.55em;width:7px;height:7px;border:1.5px solid #6b5b4f;border-radius:99px}.chips span{display:inline-block;margin:0 7px 8px 0;padding:7px 10px;border:1px solid #dbd9d4;border-radius:999px;background:#faf9f7;font:700 11px 'DM Sans',Arial,sans-serif;color:#6b5b4f;letter-spacing:.02em}
]]></style><rect width="390" height="980" fill="#faf9f7"/><circle cx="315" cy="88" r="54" fill="#eeecea"/><circle cx="62" cy="892" r="44" fill="#eeecea" opacity=".65"/><g transform="translate(223 58) scale(0.88)" fill="none" stroke="#6b5b4f" stroke-width="2" stroke-linecap="round"><path d="M4 20h116M14 20l18-16h60l18 16M20 20v76M48 20v76M76 20v76M104 20v76M10 96h104M4 108h116"/><path d="M22 31h12M50 31h12M78 31h12M106 31h12" opacity=".45"/></g><text x="28" y="64" class="label">Plato &#183; Profile</text><text x="28" y="111" class="title">Early life</text><text x="28" y="139" class="subtitle">Biography &amp; turning points</text><foreignObject x="28" y="164" width="334" height="74"><div xmlns="http://www.w3.org/1999/xhtml" class="chips" style="box-sizing:border-box;font-family:'DM Sans',system-ui,-apple-system,sans-serif;color:#1e1c18;font-size:15px;line-height:1.62;font-size:0;"><span>Athens</span><span>399 BCE</span><span>travels</span><span>Academy</span></div></foreignObject><foreignObject x="28" y="252" width="334" height="696"><div xmlns="http://www.w3.org/1999/xhtml" class="body " style="box-sizing:border-box;font-family:'DM Sans',system-ui,-apple-system,sans-serif;color:#1e1c18;font-size:15px;line-height:1.62;">Plato was born into an <strong>aristocratic Athenian</strong> milieu during the Peloponnesian War era. Biographical detail is partly legendary, but the standard story stresses an early interest in <strong>politics</strong>, shattered by <strong>Socrates&apos; trial and execution (399 BCE)</strong>&#8212;an event Plato portrayed as a civic and moral crisis. Later traditions describe travels (often cited: <strong>Italy/Sicily</strong>, sometimes <strong>Egypt</strong>) that influenced his views on governance and mathematics. He returned to Athens and founded the <strong>Academy</strong> around <strong>387 BCE</strong>, creating an enduring institutional center for mathematics and philosophy.</div></foreignObject></svg>


