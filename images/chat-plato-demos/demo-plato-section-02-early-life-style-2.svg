<title id="title">Plato - Early life - symbol-field</title><desc id="desc">Minimal Plato profile page with preserved wording and added portrait or design symbols.</desc><style><![CDATA[
  .label{font:700 11px 'DM Sans',Arial,sans-serif;letter-spacing:.13em;text-transform:uppercase;fill:#7a7874}
  .title{font:400 28px 'DM Serif Display',Georgia,serif;fill:#1e1c18}
