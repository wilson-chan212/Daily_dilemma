<title id="title">Plato - Key achievements - symbol-field</title><desc id="desc">Minimal Plato profile page with preserved wording and added portrait or design symbols.</desc><style><![CDATA[
  .label{font:700 11px 'DM Sans',Arial,sans-serif;letter-spacing:.13em;text-transform:uppercase;fill:#7a7874}
  .title{font:400 28px 'DM Serif Display',Georgia,serif;fill:#1e1c18}
  .subtitle{font:500 13px 'DM Sans',Arial,sans-serif;fill:#7a7874}
  .body strong{font-weight:700;color:#6b5b4f.body em{font-style:italic}.body p{margin:0}.body ul{margin:0;padding:0;list-style:none}.body li{margin:0 0 18px;padding:0 0 18px 20px;border-bottom:1px solid #eeecea;position:relative}.body li:last-child{border-bottom:0;margin-bottom:0}.body li:before{content:'';position:absolute;left:0;top:.55em;width:7px;height:7px;border:1.5px solid #6b5b4f;border-radius:99px}.chips span{display:inline-block;margin:0 7px 8px 0;padding:7px 10px;border:1px solid #dbd9d4;border-radius:999px;background:#faf9f7;font:700 11px 'DM Sans',Arial,sans-serif;color:#6b5b4f;letter-spacing:.02em}
]]></style><rect width="390" height="1180" fill="#faf9f7"/><circle cx="315" cy="88" r="54" fill="#eeecea"/><circle cx="62" cy="1092" r="44" fill="#eeecea" opacity=".65"/><g transform="translate(220 58) scale(0.82)" fill="none" stroke="#6b5b4f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="105" cy="22" r="14" fill="#c5603a" opacity=".18"/><path d="M105 0v8M105 36v8M83 22h8M119 22h8M90 7l6 6M120 7l-6 6M90 37l6-6M120 37l-6-6" stroke="#c5603a"/><path d="M0 106c12-54 41-81 87-81 25 0 47 10 67 29"/><path d="M14 106c10-31 31-47 63-47 17 0 33 6 48 18"/><path d="M27 106h128"/></g><text x="28" y="64" class="label">Plato &#183; Profile</text><text x="28" y="111" class="title">Key achievements</text><text x="28" y="139" class="subtitle">Institution, method, and ideas</text><foreignObject x="28" y="164" width="334" height="74"><div xmlns="http://www.w3.org/1999/xhtml" class="chips" style="box-sizing:border-box;font-family:'DM Sans',system-ui,-apple-system,sans-serif;color:#1e1c18;font-size:15px;line-height:1.62;font-size:0;"><span>Academy</span><span>Dialogue</span><span>Forms</span><span>Cave</span></div></foreignObject><foreignObject x="28" y="252" width="334" height="896"><div xmlns="http://www.w3.org/1999/xhtml" class="body list" style="box-sizing:border-box;font-family:'DM Sans',system-ui,-apple-system,sans-serif;color:#1e1c18;font-size:15px;line-height:1.62;"><ul><li><strong>Founded the Academy,</strong> one of antiquity&apos;s most famous centers of learning (often popularly called the first &quot;university-like&quot; institution in the Greek world).</li><li>Developed a unified agenda spanning <strong>ethics, political philosophy, metaphysics, epistemology, psychology</strong>, and philosophy of education&#8212;often within single dialogues.</li><li>Produced a corpus whose literary form (<strong>dialogue</strong>) became a model for philosophy as collaborative inquiry and staged disagreement.</li><li>Introduced enduring philosophical devices&#8212;especially the <strong>Theory of Forms</strong>, the <strong>tripartite soul</strong>, and thought experiments like the <strong>Allegory of the Cave</strong>&#8212;that shaped Neoplatonism, Christian theology, and modern debates about realism and education.</li></ul></div></foreignObject></svg>

