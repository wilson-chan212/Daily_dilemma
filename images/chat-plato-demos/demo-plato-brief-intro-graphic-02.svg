    <div style="flex:0 0 30px;display:flex;flex-direction:column;align-items:center;">
      <div style="width:26px;height:26px;border-radius:50%;background:#4a87a818;border:2px solid #4a87a8;color:#4a87a8;font:700 11px 'DM Sans',Arial,sans-serif;display:flex;align-items:center;justify-content:center;">I</div>
      <div style="width:2px;flex:1;min-height:26px;background:linear-gradient(180deg,#4a87a850,#eeecea);margin:5px 0;border-radius:1px;"></div>
    </div>
    <div style="flex:1;min-width:0;border-radius:16px;background:#faf9f7;border:1px solid #dbd9d4;box-shadow:0 6px 22px rgba(0,0,0,.06);overflow:hidden;">
      <div style="height:2px;background:#4a87a8;"></div>
      <div style="padding:11px 13px 13px;font-size:12.5px;line-height:1.72;letter-spacing:.012em;color:#1e1c18;">Plato is one of the most influential philosophers in the European tradition and a defining shaper of how &quot;philosophy&quot; is practiced as systematic argument in dialogue form.</div>
    </div>
  </div>
        <div style="display:flex;gap:10px;align-items:stretch;margin-bottom:12px;">
    <div style="flex:0 0 30px;display:flex;flex-direction:column;align-items:center;">
      <div style="width:26px;height:26px;border-radius:50%;background:#6b5b4f18;border:2px solid #6b5b4f;color:#6b5b4f;font:700 11px 'DM Sans',Arial,sans-serif;display:flex;align-items:center;justify-content:center;">II</div>
      <div style="width:2px;flex:1;min-height:26px;background:linear-gradient(180deg,#6b5b4f50,#eeecea);margin:5px 0;border-radius:1px;"></div>
    </div>
    <div style="flex:1;min-width:0;border-radius:16px;background:#faf9f7;border:1px solid #dbd9d4;box-shadow:0 6px 22px rgba(0,0,0,.06);overflow:hidden;">
      <div style="height:2px;background:#6b5b4f;"></div>
      <div style="padding:11px 13px 13px;font-size:12.5px;line-height:1.72;letter-spacing:.012em;color:#1e1c18;">His writings are almost entirely <strong style="font-weight:700;color:#6b5b4f">dialogues</strong>, many starring <strong style="font-weight:700;color:#6b5b4f">Socrates</strong>, blending drama, rhetoric critique, and arguments about <strong style="font-weight:700;color:#6b5b4f">justice</strong>, <strong style="font-weight:700;color:#6b5b4f">knowledge</strong>, <strong style="font-weight:700;color:#6b5b4f">love</strong>, <strong style="font-weight:700;color:#6b5b4f">death and the soul</strong>, and the <strong style="font-weight:700;color:#6b5b4f">ideal community</strong>.</div>
    </div>
  </div>
        <div style="display:flex;gap:10px;align-items:stretch;margin-bottom:0;">
    <div style="flex:0 0 30px;display:flex;flex-direction:column;align-items:center;">
      <div style="width:26px;height:26px;border-radius:50%;background:#c5603a18;border:2px solid #c5603a;color:#c5603a;font:700 11px 'DM Sans',Arial,sans-serif;display:flex;align-items:center;justify-content:center;">III</div>
      
    </div>
    <div style="flex:1;min-width:0;border-radius:16px;background:#faf9f7;border:1px solid #dbd9d4;box-shadow:0 6px 22px rgba(0,0,0,.06);overflow:hidden;">
      <div style="height:2px;background:#c5603a;"></div>
      <div style="padding:11px 13px 13px;font-size:12.5px;line-height:1.72;letter-spacing:.012em;color:#1e1c18;">Interpreters disagree on how literally to take some proposals (for example in the <em>Republic</em>), but the texts persistently press the reader to ask what makes a life and a city <strong style="font-weight:700;color:#6b5b4f">good</strong>, not merely powerful or pleasant.</div>
    </div>
  </div>
