<title id="title">Plato - Key achievements - diagram-line</title><desc id="desc">Minimal Plato profile page with preserved wording and added portrait or design symbols.</desc><style><![CDATA[
  .label{font:700 11px 'DM Sans',Arial,sans-serif;letter-spacing:.13em;text-transform:uppercase;fill:#7a7874}
  .title{font:400 28px 'DM Serif Display',Georgia,serif;fill:#1e1c18}
  .subtitle{font:500 13px 'DM Sans',Arial,sans-serif;fill:#7a7874}
  .body strong{font-weight:700;color:#6b5b4f.body em{font-style:italic}.body p{margin:0}.body ul{margin:0;padding:0;list-style:none}.body li{margin:0 0 18px;padding:0 0 18px 20px;border-bottom:1px solid #eeecea;position:relative}.body li:last-child{border-bottom:0;margin-bottom:0}.body li:before{content:'';position:absolute;left:0;top:.55em;width:7px;height:7px;border:1.5px solid #6b5b4f;border-radius:99px}.chips span{display:inline-block;margin:0 7px 8px 0;padding:7px 10px;border:1px solid #dbd9d4;border-radius:999px;background:#faf9f7;font:700 11px 'DM Sans',Arial,sans-serif;color:#6b5b4f;letter-spacing:.02em}
]]></style><rect width="390" height="1180" fill="#f5f4f0"/><path d="M42 78v1032" stroke="#dbd9d4" stroke-width="1.5"/><circle cx="42" cy="104" r="8" fill="#4a87a8" opacity=".75"/><circle cx="42" cy="176" r="8" fill="#6b5b4f" opacity=".75"/><circle cx="42" cy="248" r="8" fill="#c5603a" opacity=".75"/><g transform="translate(218 44) scale(0.82)" fill="none" stroke="#6b5b4f" stroke-width="2" stroke-linecap="round"><path d="M4 20h116M14 20l18-16h60l18 16M20 20v76M48 20v76M76 20v76M104 20v76M10 96h104M4 108h116"/><path d="M22 31h12M50 31h12M78 31h12M106 31h12" opacity=".45"/></g><text x="70" y="70" class="label">Plato &#183; Profile</text><text x="70" y="118" class="title">Key achievements</text><text x="70" y="146" class="subtitle">Institution, method, and ideas</text><rect x="70" y="168" width="210" height="1" fill="#dbd9d4"/><foreignObject x="70" y="204" width="292" height="944"><div xmlns="http://www.w3.org/1999/xhtml" class="body list" style="box-sizing:border-box;font-family:'DM Sans',system-ui,-apple-system,sans-serif;color:#1e1c18;font-size:15px;line-height:1.62;"><ul><li><strong>Founded the Academy,</strong> one of antiquity&apos;s most famous centers of learning (often popularly called the first &quot;university-like&quot; institution in the Greek world).</li><li>Developed a unified agenda spanning <strong>ethics, political philosophy, metaphysics, epistemology, psychology</strong>, and philosophy of education&#8212;often within single dialogues.</li><li>Produced a corpus whose literary form (<strong>dialogue</strong>) became a model for philosophy as collaborative inquiry and staged disagreement.</li><li>Introduced enduring philosophical devices&#8212;especially the <strong>Theory of Forms</strong>, the <strong>tripartite soul</strong>, and thought experiments like the <strong>Allegory of the Cave</strong>&#8212;that shaped Neoplatonism, Christian theology, and modern debates about realism and education.</li></ul></div></foreignObject></svg>

