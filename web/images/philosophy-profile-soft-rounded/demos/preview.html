<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Philosophy profile image — style demos</title>
  <style>
    :root { font-family: system-ui, sans-serif; color: #1a1a1a; background: #faf9f7; }
    body { margin: 0; padding: 2rem 1.5rem 3rem; max-width: 1100px; margin-inline: auto; }
    h1 { font-size: 1.35rem; font-weight: 600; margin: 0 0 .35rem; }
    p.lead { margin: 0 0 2rem; color: #555; font-size: .95rem; line-height: 1.5; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; }
    figure { margin: 0; background: #fff; border: 1px solid #e5e2dc; border-radius: 12px; overflow: hidden; }
    figcaption { padding: .75rem 1rem 1rem; font-size: .85rem; line-height: 1.45; }
    figcaption strong { display: block; margin-bottom: .25rem; }
    img { display: block; width: 100%; aspect-ratio: 1; object-fit: contain; background: #f5f3ef; }
  </style>
</head>
<body>
  <h1>Philosophy profile — five style demos</h1>
  <p class="lead">Sample archetype: <strong>Stoic Architect</strong> (structure, stacking blocks). PNG/JPG exports sit beside the SVG sources in this folder. Re-export: <code>node scripts/convert-philosophy-profile-demos.mjs</code></p>
  <div class="grid">
    <figure>
      <img src="demo-pp-stoic-architect-style-01-line-editorial.png" alt="Style 1 line editorial"/>
      <figcaption><strong>1 — Editorial line</strong>Thin outlines, cream ground, one cool accent. Matches dilemma card illustrations.</figcaption>
    </figure>
    <figure>
      <img src="demo-pp-stoic-architect-style-02-flat-warm.png" alt="Style 2 flat warm"/>
      <figcaption><strong>2 — Flat warm</strong>Soft filled shapes, stone/warm neutrals. Matches philosopher profile scroll art.</figcaption>
    </figure>
    <figure>
      <img src="demo-pp-stoic-architect-style-03-icon-glyph.png" alt="Style 3 icon glyph"/>
      <figcaption><strong>3 — Icon glyph</strong>Silhouette + light accent. Compact at small sizes (hero thumbnail).</figcaption>
    </figure>
    <figure>
      <img src="demo-pp-stoic-architect-style-04-soft-flat-rounded.png" alt="Style 4 soft flat rounded"/>
      <figcaption><strong>4 — Soft flat rounded</strong>2D version of current clay look; uses profile <em>blue</em> tone palette.</figcaption>
    </figure>
    <figure>
      <img src="demo-pp-stoic-architect-style-05-duotone-geometric.png" alt="Style 5 duotone geometric"/>
      <figcaption><strong>5 — Duotone geometric</strong>Two colors only; abstract figure + blocks. Most minimal.</figcaption>
    </figure>
  </div>
</body>
</html>
