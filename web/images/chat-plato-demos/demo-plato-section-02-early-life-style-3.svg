]]></style><rect width="390" height="980" fill="#f5f4f0"/><path d="M42 78v832" stroke="#dbd9d4" stroke-width="1.5"/><circle cx="42" cy="104" r="8" fill="#4a87a8" opacity=".75"/><circle cx="42" cy="176" r="8" fill="#6b5b4f" opacity=".75"/><circle cx="42" cy="248" r="8" fill="#c5603a" opacity=".75"/><g transform="translate(302 42) scale(0.48)" fill="none" stroke="#6b5b4f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"><circle cx="42" cy="34" r="24" fill="#faf9f7"/><path d="M24 41c7 16 29 18 38 0"/><path d="M21 31c10-17 35-18 44 0"/><path d="M28 69c-19 7-28 20-28 40h84c0-20-9-33-28-40" fill="#eeecea"/><path d="M31 28c3 5 4 8 3 12"/><path d="M53 28c-3 5-4 8-3 12"/><path d="M32 102c8-10 23-10 31 0"/><path d="M18 80c10 8 38 8 49 0"/></g><text x="70" y="70" class="label">Plato &#183; Profile</text><text x="70" y="118" class="title">Early life</text><text x="70" y="146" class="subtitle">Biography &amp; turning points</text><rect x="70" y="168" width="210" height="1" fill="#dbd9d4"/><foreignObject x="70" y="204" width="292" height="744"><div xmlns="http://www.w3.org/1999/xhtml" class="body " style="box-sizing:border-box;font-family:'DM Sans',system-ui,-apple-system,sans-serif;color:#1e1c18;font-size:15px;line-height:1.62;">Plato was born into an <strong>aristocratic Athenian</strong> milieu during the Peloponnesian War era. Biographical detail is partly legendary, but the standard story stresses an early interest in <strong>politics</strong>, shattered by <strong>Socrates&apos; trial and execution (399 BCE)</strong>&#8212;an event Plato portrayed as a civic and moral crisis. Later traditions describe travels (often cited: <strong>Italy/Sicily</strong>, sometimes <strong>Egypt</strong>) that influenced his views on governance and mathematics. He returned to Athens and founded the <strong>Academy</strong> around <strong>387 BCE</strong>, creating an enduring institutional center for mathematics and philosophy.</div></foreignObject></svg>



