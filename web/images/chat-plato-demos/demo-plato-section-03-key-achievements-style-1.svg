<title id="title">Plato - Key achievements - portrait-card</title><desc id="desc">Minimal Plato profile page with preserved wording and added portrait or design symbols.</desc><style><![CDATA[
  .label{font:700 11px 'DM Sans',Arial,sans-serif;letter-spacing:.13em;text-transform:uppercase;fill:#7a7874}
  .title{font:400 28px 'DM Serif Display',Georgia,serif;fill:#1e1c18}
  .subtitle{font:500 13px 'DM Sans',Arial,sans-serif;fill:#7a7874}
  .body strong{font-weight:700;color:#6b5b4f.body em{font-style:italic}.body p{margin:0}.body ul{margin:0;padding:0;list-style:none}.body li{margin:0 0 18px;padding:0 0 18px 20px;border-bottom:1px solid #eeecea;position:relative}.body li:last-child{border-bottom:0;margin-bottom:0}.body li:before{content:'';position:absolute;left:0;top:.55em;width:7px;height:7px;border:1.5px solid #6b5b4f;border-radius:99px}.chips span{display:inline-block;margin:0 7px 8px 0;padding:7px 10px;border:1px solid #dbd9d4;border-radius:999px;background:#faf9f7;font:700 11px 'DM Sans',Arial,sans-serif;color:#6b5b4f;letter-spacing:.02em}
]]></style><rect width="390" height="1180" fill="#f5f4f0"/><rect x="24" y="26" width="342" height="1128" rx="28" fill="#faf9f7" stroke="#dbd9d4"/><g transform="translate(246 50) scale(0.92)" fill="none" stroke="#6b5b4f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"><circle cx="42" cy="34" r="24" fill="#faf9f7"/><path d="M24 41c7 16 29 18 38 0"/><path d="M21 31c10-17 35-18 44 0"/><path d="M28 69c-19 7-28 20-28 40h84c0-20-9-33-28-40" fill="#eeecea"/><path d="M31 28c3 5 4 8 3 12"/><path d="M53 28c-3 5-4 8-3 12"/><path d="M32 102c8-10 23-10 31 0"/><path d="M18 80c10 8 38 8 49 0"/></g><text x="48" y="70" class="label">Plato &#183; Profile</text><text x="48" y="114" class="title">Key achievements</text><text x="48" y="142" class="subtitle">Institution, method, and ideas</text><rect x="48" y="164" width="54" height="2" rx="1" fill="#c5603a"/><foreignObject x="48" y="190" width="294" height="958"><div xmlns="http://www.w3.org/1999/xhtml" class="body list" style="box-sizing:border-box;font-family:'DM Sans',system-ui,-apple-system,sans-serif;color:#1e1c18;font-size:15px;line-height:1.62;"><ul><li><strong>Founded the Academy,</strong> one of antiquity&apos;s most famous centers of learning (often popularly called the first &quot;university-like&quot; institution in the Greek world).</li><li>Developed a unified agenda spanning <strong>ethics, political philosophy, metaphysics, epistemology, psychology</strong>, and philosophy of education&#8212;often within single dialogues.</li><li>Produced a corpus whose literary form (<strong>dialogue</strong>) became a model for philosophy as collaborative inquiry and staged disagreement.</li><li>Introduced enduring philosophical devices&#8212;especially the <strong>Theory of Forms</strong>, the <strong>tripartite soul</strong>, and thought experiments like the <strong>Allegory of the Cave</strong>&#8212;that shaped Neoplatonism, Christian theology, and modern debates about realism and education.</li></ul></div></foreignObject></svg>

