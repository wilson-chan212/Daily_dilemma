<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="390" height="1280" viewBox="0 0 390 1280" role="img" aria-labelledby="t d">
  <title id="t">Plato brief introduction graphic demo</title>
  <desc id="d">Full introductory paragraph with infographic-style layout.</desc>
  <rect width="390" height="1280" fill="#f5f4f0"/><circle cx="300" cy="96" r="62" fill="#faf9f7" stroke="#dbd9d4"/><g transform="translate(272,68) scale(1.05)" fill="none" stroke="#6b5b4f" stroke-width="2" stroke-linecap="round"><circle cx="22" cy="18" r="14"/><path d="M8 34c4 12 12 18 22 18s18-6 22-18"/><path d="M6 14c4-7 12-10 22-10s18 3 22 10"/></g><rect x="24" y="228" width="160" height="3" rx="1.5" fill="#c5603a"/><text x="24" y="268" fill="#7a7874" font-family="DM Sans,Arial,sans-serif" font-size="10" letter-spacing="0.14em">THEMES</text><g transform="translate(36,286) scale(0.75)" fill="none" stroke="#c5603a" stroke-width="2"><path d="M2 10c10-7 30-7 40 0v16c-10 9-30 9-40 0z"/><path d="M14 20h4M28 20h4"/><path d="M20 26c3 2 7 2 10 0"/></g><g transform="translate(116,284) scale(0.75)" fill="none" stroke="#6b5b4f" stroke-width="2"><path d="M6 4h20a4 4 0 0 1 4 4v30a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8a4 4 0 0 1 4-4z"/><path d="M10 14h16M10 20h14M10 26h16"/></g><g transform="translate(196,284) scale(0.72)" fill="none" stroke="#4a87a8" stroke-width="2"><path d="M2 32V6h36v26M10 6v26M20 6v26M30 6v26M4 2h32"/></g><g transform="translate(276,278) scale(0.85)" fill="none" stroke="#c5603a" stroke-width="1.8"><circle cx="18" cy="18" r="9" fill="#c5603a" fill-opacity="0.15"/><path d="M18 2v4M18 30v4M2 18h4M30 18h4"/></g><rect x="24" y="332" width="342" height="1" fill="#eeecea"/><foreignObject x="0" y="0" width="390" height="230">
    <div xmlns="http://www.w3.org/1999/xhtml" style="box-sizing:border-box;font-family:'DM Sans',system-ui,-apple-system,sans-serif;color:#1e1c18;font-size:14.5px;line-height:1.68;">
      <div style="padding:28px 24px 8px;background:#f5f4f0;">
        <p style="margin:0 0 12px;font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:#7a7874;">Plato &#183; Profile</p>
        <h1 style="margin:0;font-family:'DM Serif Display',Georgia,serif;font-size:30px;font-weight:400;color:#1e1c18;">Brief introduction</h1>
      </div>
    </div>
  </foreignObject><foreignObject x="0" y="340" width="390" height="260">
    <div xmlns="http://www.w3.org/1999/xhtml" style="box-sizing:border-box;font-family:'DM Sans',system-ui,-apple-system,sans-serif;color:#1e1c18;font-size:14.5px;line-height:1.68;">
      <div style="padding:0 22px;">
        <div style="padding:20px;border-radius:20px;background:#faf9f7;border:1px solid #dbd9d4;box-shadow:0 3px 14px rgba(0,0,0,.05);">
          <p style="margin:0;font-size:22px;font-family:'DM Serif Display',Georgia,serif;line-height:1.25;color:#4a87a8;opacity:.9;">&#8220;</p>
          <p style="margin:6px 0 0;font-size:15px;line-height:1.65;color:#1e1c18;">Plato is one of the most influential philosophers in the European tradition and a defining shaper of how &quot;philosophy&quot; is practiced as systematic argument in dialogue form.</p>
        </div>
      </div>
    </div>
  </foreignObject><foreignObject x="0" y="600" width="390" height="300">
    <div xmlns="http://www.w3.org/1999/xhtml" style="box-sizing:border-box;font-family:'DM Sans',system-ui,-apple-system,sans-serif;color:#1e1c18;font-size:14.5px;line-height:1.68;">
      <div style="padding:0 22px;">
        <div style="display:flex;gap:10px;align-items:flex-start;margin-bottom:14px;">
          <span style="flex-shrink:0;width:32px;height:32px;border-radius:10px;background:#c5603a22;display:flex;align-items:center;justify-content:center;color:#c5603a;font-weight:700;font-size:14px;">2</span>
          <span style="font-size:11px;letter-spacing:0.08em;text-transform:uppercase;color:#7a7874;padding-top:8px;">Cast &amp; topics</span>
        </div>
        <div style="padding:18px 18px 20px;border-radius:18px;background:#faf9f7;border:1px solid #dbd9d4;">
          <p style="margin:0;">His writings are almost entirely <strong style="font-weight:700;color:#6b5b4f">dialogues</strong>, many starring <strong style="font-weight:700;color:#6b5b4f">Socrates</strong>, blending drama, rhetoric critique, and arguments about <strong style="font-weight:700;color:#6b5b4f">justice</strong>, <strong style="font-weight:700;color:#6b5b4f">knowledge</strong>, <strong style="font-weight:700;color:#6b5b4f">love</strong>, <strong style="font-weight:700;color:#6b5b4f">death and the soul</strong>, and the <strong style="font-weight:700;color:#6b5b4f">ideal community</strong>.</p>
        </div>
      </div>
    </div>
  </foreignObject><foreignObject x="0" y="900" width="390" height="340">
    <div xmlns="http://www.w3.org/1999/xhtml" style="box-sizing:border-box;font-family:'DM Sans',system-ui,-apple-system,sans-serif;color:#1e1c18;font-size:14.5px;line-height:1.68;">
      <div style="padding:0 22px 36px;">
        <div style="display:flex;gap:12px;align-items:center;margin-bottom:14px;">
          <span style="flex-shrink:0;width:36px;height:36px;border-radius:12px;background:#4a87a822;display:flex;align-items:center;justify-content:center;font-family:'DM Serif Display',Georgia,serif;font-size:16px;color:#4a87a8;">R</span>
          <span style="font-size:11px;letter-spacing:0.08em;text-transform:uppercase;color:#7a7874;">Reading the <em>Republic</em></span>
        </div>
        <div style="padding:18px;border-radius:18px;background:linear-gradient(145deg,#faf9f7 0%, #f5f4f0 100%);border:1px solid #dbd9d4;">
          <p style="margin:0;">Interpreters disagree on how literally to take some proposals (for example in the <em>Republic</em>), but the texts persistently press the reader to ask what makes a life and a city <strong style="font-weight:700;color:#6b5b4f">good</strong>, not merely powerful or pleasant.</p>
        </div>
      </div>
    </div>
  </foreignObject>
</svg>
