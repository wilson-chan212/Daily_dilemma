]]></style><rect width="390" height="980" fill="#faf9f7"/><circle cx="315" cy="88" r="54" fill="#eeecea"/><circle cx="62" cy="892" r="44" fill="#eeecea" opacity=".65"/><g transform="translate(218 58) scale(0.78)" fill="none" stroke="#6b5b4f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="105" cy="22" r="14" fill="#c5603a" opacity=".18"/><path d="M105 0v8M105 36v8M83 22h8M119 22h8M90 7l6 6M120 7l-6 6M90 37l6-6M120 37l-6-6" stroke="#c5603a"/><path d="M0 106c12-54 41-81 87-81 25 0 47 10 67 29"/><path d="M14 106c10-31 31-47 63-47 17 0 33 6 48 18"/><path d="M27 106h128"/></g><text x="28" y="64" class="label">Plato &#183; Profile</text><text x="28" y="111" class="title">Brief introduction</text><text x="28" y="139" class="subtitle">Why Plato still shapes philosophy</text><foreignObject x="28" y="164" width="334" height="74"><div xmlns="http://www.w3.org/1999/xhtml" class="chips" style="box-sizing:border-box;font-family:'DM Sans',system-ui,-apple-system,sans-serif;color:#1e1c18;font-size:15px;line-height:1.62;font-size:0;"><span>dialogues</span><span>justice</span><span>knowledge</span><span>good</span></div></foreignObject><foreignObject x="28" y="252" width="334" height="696"><div xmlns="http://www.w3.org/1999/xhtml" class="body " style="box-sizing:border-box;font-family:'DM Sans',system-ui,-apple-system,sans-serif;color:#1e1c18;font-size:15px;line-height:1.62;">Plato is one of the most influential philosophers in the European tradition and a defining shaper of how "philosophy" is practiced as systematic argument in dialogue form. His writings are almost entirely <strong>dialogues</strong>, many starring <strong>Socrates</strong>, blending drama, rhetoric critique, and arguments about <strong>justice</strong>, <strong>knowledge</strong>, <strong>love</strong>, <strong>death and the soul</strong>, and the <strong>ideal community</strong>. Interpreters disagree on how literally to take some proposals (for example in the <em>Republic</em>), but the texts persistently press the reader to ask what makes a life and a city <strong>good</strong>, not merely powerful or pleasant.</div></foreignObject></svg>

