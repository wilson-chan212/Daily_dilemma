<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Dialogue — icon concepts</title>
  <style>
    :root {
      --bg: #f5f4f0;
      --text: #1e1c18;
      --muted: #7a7874;
      --card: #fff;
      --border: #dbd9d4;
      --pale: #e6eef7;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      padding: 2rem 1.5rem 3rem;
    }
    h1 { font-size: 1.5rem; font-weight: 600; margin: 0 0 0.35rem; }
    .lead { color: var(--muted); max-width: 42rem; margin: 0 0 2rem; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1.25rem;
      max-width: 1200px;
    }
    figure {
      margin: 0;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }
    .thumb {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.25rem;
      background: var(--pale);
    }
    .thumb--dark { background: #141310; }
    .thumb img { width: 100%; max-width: 180px; height: auto; }
    figcaption {
      padding: 0.85rem 1rem 1rem;
      font-size: 0.875rem;
    }
    figcaption strong { display: block; margin-bottom: 0.25rem; }
    figcaption span { color: var(--muted); font-size: 0.8rem; }
    .sizes { margin-top: 2.5rem; max-width: 1200px; }
    .sizes h2 { font-size: 1.1rem; margin-bottom: 1rem; }
    .size-row {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-end;
      gap: 1.5rem 2rem;
      padding: 1.25rem;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
    }
    .size-row label {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.75rem;
      color: var(--muted);
    }
    .size-row img { display: block; }
    code { font-size: 0.85em; }
  </style>
</head>
<body>
  <h1>Dialogue — 5 icon concepts</h1>
  <p class="lead">
    Minimalist two-tone symbols matching your references (classical bust / Thinker + chat).
    Navy <code>#1a2f4f</code> on pale <code>#e6eef7</code>; concept 2 is black on white.
  </p>

  <div class="grid">
    <figure>
      <div class="thumb">
        <img src="chat-philosopher-01-bust-bubble.svg" alt="" width="180" height="180"/>
      </div>
      <figcaption>
        <strong>01 — Bust + bubble</strong>
        <span>Profile philosopher with overlapping speech bubble and typing dots.</span>
      </figcaption>
    </figure>
    <figure>
      <div class="thumb thumb--dark">
        <img src="chat-philosopher-02-thinker-chat.svg" alt="" width="180" height="180"/>
      </div>
      <figcaption>
        <strong>02 — Thinker + chat</strong>
        <span>Contemplative pose with thought rays and bubble (high-contrast B/W).</span>
      </figcaption>
    </figure>
    <figure>
      <div class="thumb">
        <img src="chat-philosopher-03-medallion-bubble.svg" alt="" width="180" height="180"/>
      </div>
      <figcaption>
        <strong>03 — Medallion in bubble</strong>
        <span>Frontal bust inside a large speech bubble — strong at tab-bar size.</span>
      </figcaption>
    </figure>
    <figure>
      <div class="thumb">
        <img src="chat-philosopher-04-dialogue-duo.svg" alt="" width="180" height="180"/>
      </div>
      <figcaption>
        <strong>04 — Dialogue duo</strong>
        <span>Two facing busts over a shared conversation bubble.</span>
      </figcaption>
    </figure>
    <figure>
      <div class="thumb">
        <img src="chat-philosopher-05-scholar-badge.svg" alt="" width="180" height="180"/>
      </div>
      <figcaption>
        <strong>05 — Scholar + badge</strong>
        <span>Mortarboard bust (like your reference) plus chat badge.</span>
      </figcaption>
    </figure>
  </div>

  <section class="sizes">
    <h2>Legibility at UI sizes (concept 03)</h2>
    <div class="size-row">
      <label><img src="chat-philosopher-03-medallion-bubble.svg" width="16" height="16" alt=""/>16px</label>
      <label><img src="chat-philosopher-03-medallion-bubble.svg" width="22" height="22" alt=""/>22px tab</label>
      <label><img src="chat-philosopher-03-medallion-bubble.svg" width="32" height="32" alt=""/>32px</label>
      <label><img src="chat-philosopher-03-medallion-bubble.svg" width="48" height="48" alt=""/>48px</label>
    </div>
  </section>
</body>
</html>
